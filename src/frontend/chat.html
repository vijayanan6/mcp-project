<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.3px; }
    #tools-badge {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.75rem;
      color: #a0aec0;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      background: #1a1a2e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      background: #fff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .tool-tag {
      align-self: flex-start;
      background: #eaf4fb;
      color: #2a7aaa;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-family: monospace;
    }
    .usage-tag {
      align-self: flex-start;
      color: #aaa;
      font-size: 0.72rem;
      padding: 2px 0 6px 0;
    }
    .typing {
      align-self: flex-start;
      color: #999;
      font-size: 0.85rem;
      font-style: italic;
      padding: 4px 0;
    }

    /* ── New session button ── */
    #new-session {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: #a0aec0;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    #new-session:hover { background: rgba(255,255,255,0.1); }
    #cost-link {
      background: transparent;
      border: 1px solid rgba(52,211,153,0.4);
      color: #34d399;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    #cost-link:hover { background: rgba(52,211,153,0.1); }
    #credit-alert {
      background: #ef4444;
      color: #fff;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.75rem;
      font-weight: 700;
      display: none;
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

    /* ── Footer / input ── */
    footer {
      background: #fff;
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 10px;
    }
    #input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      height: 44px;
    }
    #input:focus { border-color: #1a1a2e; }
    #send {
      background: #1a1a2e;
      color: #fff;
      border: none;
      padding: 0 22px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #send:hover { background: #2d2d4e; }
    #send:disabled { background: #9ca3af; cursor: not-allowed; }
    #attach-btn {
      background: transparent;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1.1rem;
      padding: 0 14px;
      cursor: pointer;
    }
    #attach-btn:hover { background: #f0f2f5; }
    #attachment-chip {
      display: none;
      align-items: center;
      gap: 8px;
      background: #eaf4fb;
      color: #2a7aaa;
      border-radius: 8px;
      padding: 6px 12px;
      margin: 0 16px 8px 16px;
      font-size: 0.85rem;
      align-self: flex-start;
    }
    #remove-attachment {
      background: transparent;
      border: none;
      color: #2a7aaa;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
    }
    #attachment-error {
      display: none;
      color: #ef4444;
      font-size: 0.8rem;
      padding: 0 16px 6px 16px;
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ MCP Learning Agent</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <span id="tools-badge">Loading tools…</span>
    <span id="credit-alert">⚠ Low Credits</span>
    <a id="cost-link" href="/usage" target="_blank">Cost Dashboard</a>
    <button id="new-session" onclick="newSession()">New chat</button>
  </div>
</header>

<div id="messages"></div>

<div id="attachment-chip">
  📎 <span id="attachment-name"></span>
  <button id="remove-attachment" type="button" title="Remove attachment">×</button>
</div>
<div id="attachment-error"></div>

<footer>
  <input id="file-input" type="file" accept="image/jpeg,image/png,image/gif,image/webp,application/pdf" style="display:none" />
  <button id="attach-btn" type="button" title="Attach image or PDF">📎</button>
  <input id="input" type="text" placeholder="Ask anything…" autocomplete="off" />
  <button id="send">Send</button>
</footer>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let sessionId = localStorage.getItem("mcp_session_id") || "";
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send");

  // ── Attachments (image/PDF) ─────────────────────────────────────────────
  const ATTACHMENT_ALLOWED_TYPES = ["image/jpeg","image/png","image/gif","image/webp","application/pdf"];
  const MAX_IMAGE_BYTES = 5 * 1024 * 1024;
  const MAX_PDF_BYTES   = 10 * 1024 * 1024;
  let pendingAttachment = null;   // { media_type, data, filename } | null

  const fileInputEl   = document.getElementById("file-input");
  const attachBtnEl   = document.getElementById("attach-btn");
  const chipEl        = document.getElementById("attachment-chip");
  const chipNameEl     = document.getElementById("attachment-name");
  const removeAttachEl = document.getElementById("remove-attachment");
  const attachErrorEl  = document.getElementById("attachment-error");

  function showAttachmentError(msg) {
    attachErrorEl.textContent = msg;
    attachErrorEl.style.display = "block";
  }

  function clearAttachment() {
    pendingAttachment = null;
    chipEl.style.display = "none";
    attachErrorEl.style.display = "none";
    fileInputEl.value = "";
  }

  function handleFileSelect() {
    attachErrorEl.style.display = "none";
    const file = fileInputEl.files[0];
    if (!file) return;

    if (!ATTACHMENT_ALLOWED_TYPES.includes(file.type)) {
      showAttachmentError(`Unsupported file type: ${file.type || "unknown"}`);
      fileInputEl.value = "";
      return;
    }
    const cap = file.type === "application/pdf" ? MAX_PDF_BYTES : MAX_IMAGE_BYTES;
    if (file.size > cap) {
      showAttachmentError(`File too large (max ${cap / (1024 * 1024)}MB for this file type)`);
      fileInputEl.value = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      const base64Data = reader.result.split(",")[1]; // strip "data:...;base64,"
      pendingAttachment = { media_type: file.type, data: base64Data, filename: file.name };
      chipNameEl.textContent = file.name;
      chipEl.style.display = "flex";
    };
    reader.onerror = () => showAttachmentError("Could not read file");
    reader.readAsDataURL(file);
  }

  attachBtnEl.addEventListener("click", () => fileInputEl.click());
  fileInputEl.addEventListener("change", handleFileSelect);
  removeAttachEl.addEventListener("click", clearAttachment);

  // ── Load tools ───────────────────────────────────────────────────────────
  fetch("/tools")
    .then(r => r.json())
    .then(data => {
      document.getElementById("tools-badge").textContent = data.tools.join("  •  ");
    });

  // Show welcome message
  addMsg("Hi! I'm your MCP agent. I have tools to check the time, calculate math, " +
         "get weather, manage notes, and read your docs. Ask me anything!", "assistant");

  // ── Helpers ──────────────────────────────────────────────────────────────
  function escape(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function addMsg(text, role) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    scroll();
    return div;
  }

  function addToolTag(name) {
    const div = document.createElement("div");
    div.className = "tool-tag";
    div.textContent = `→ ${name}`;
    messagesEl.appendChild(div);
    scroll();
  }

  function scroll() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function newSession() {
    sessionId = "";
    localStorage.removeItem("mcp_session_id");
    messagesEl.innerHTML = "";
    addMsg("New conversation started. Ask me anything!", "assistant");
  }

  // ── Send message ─────────────────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text && !pendingAttachment) return;

    const attachmentToSend = pendingAttachment;
    inputEl.value = "";
    clearAttachment();
    sendBtn.disabled = true;
    addMsg(attachmentToSend ? `${text}\n📎 ${attachmentToSend.filename}`.trim() : text, "user");

    // Typing indicator
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "Claude is thinking…";
    messagesEl.appendChild(typing);
    scroll();

    let assistantDiv = null;
    let assistantText = "";

    try {
      const res = await fetch("/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId, attachment: attachmentToSend }),
      });

      if (!res.ok) {
        let detail = res.statusText;
        try { detail = (await res.json()).detail || detail; } catch {}
        typing.remove();
        addMsg("Error: " + detail, "assistant");
        sendBtn.disabled = false;
        inputEl.focus();
        return;
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        // Parse SSE lines
        const raw = decoder.decode(value);
        for (const line of raw.split("\n")) {
          if (!line.startsWith("data: ")) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          if (event.type === "tool") {
            typing.remove();
            addToolTag(event.name);

          } else if (event.type === "text") {
            typing.remove();
            if (!assistantDiv) assistantDiv = addMsg("", "assistant");
            assistantText += event.content;
            assistantDiv.textContent = assistantText;
            scroll();

          } else if (event.type === "done") {
            typing.remove();
            sessionId = event.session_id;
            localStorage.setItem("mcp_session_id", sessionId);
            if (event.usage || event.model) {
              const tag = document.createElement("div");
              tag.className = "usage-tag";
              const parts = [];
              if (event.usage) {
                const u = event.usage;
                const cached = u.cache_read > 0 ? ` · ${u.cache_read} cached ✓` : "";
                parts.push(`tokens: ${u.input} in · ${u.output} out${cached}`);
              }
              if (event.model) {
                const shortModel = event.model.includes("haiku") ? "haiku 💚" : "sonnet";
                parts.push(shortModel);
              }
              tag.textContent = parts.join("  ·  ");
              messagesEl.appendChild(tag);
              scroll();
            }

          } else if (event.type === "error") {
            typing.remove();
            addMsg("Error: " + event.message, "assistant");
          }
        }
      }
    } catch (err) {
      typing.remove();
      addMsg("Connection error: " + err.message, "assistant");
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener("click", send);
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // Credit alert check — runs on load and every 60s
  async function checkCredit() {
    try {
      const data = await fetch("/usage/data").then(r => r.json());
      const credit = data.credit || {};
      const totals = data.totals || {};
      const bal = credit.starting_balance || 0;
      if (bal <= 0) return; // not configured
      const spent = totals.total_cost_usd || 0;
      const remaining = Math.max(bal - spent, 0);
      const threshold = credit.alert_threshold || 1.0;
      const alertEl = document.getElementById("credit-alert");
      if (remaining <= threshold) {
        alertEl.textContent = `⚠ Low Credits ($${remaining.toFixed(2)} left)`;
        alertEl.style.display = "inline-block";
      } else {
        alertEl.style.display = "none";
      }
    } catch {}
  }
  checkCredit();
  setInterval(checkCredit, 60000);
</script>
</body>
</html>
